<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Learning Loop v3 — Inspiracja</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens-v2.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0F0E0B; }
  body { font-family: 'Geist', sans-serif; }
  #root { width: 100%; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-theme="dark">
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens-v2/main.jsx"></script>
<script type="text/babel" src="screens-v2/sessions.jsx"></script>
<script type="text/babel" src="screens-v2/study.jsx"></script>
<script type="text/babel" src="screens-v2/material-detail.jsx"></script>
<script type="text/babel" src="screens-v2/extras.jsx"></script>
<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAKS);
  React.useEffect(() => {
    document.body.setAttribute('data-theme', t.theme);
  }, [t.theme]);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="overview"
          title="Learning Loop — v3 (połączenie v1 + v2)"
          subtitle="Wszystkie ekrany w języku v2 (Geist + Source Serif, terracotta, semantyczne tokeny). Sesja powtórek i szczegół materiału przejęte z v1 i przeniesione na ten język."
        >
          <DCArtboard id="dashboard" label="01 · Przegląd (/dashboard)" width={1024} height={1100}>
            <PrzegladScreen />
          </DCArtboard>
          <DCArtboard id="materials" label="02 · Materiały — lista (/materials)" width={1024} height={1080}>
            <MaterialyScreen />
          </DCArtboard>
          <DCArtboard id="material-detail" label="03 · Materiał — szczegół (/materials/dcf-4) ★ nowy" width={1024} height={1340}>
            <MaterialDetailV2 />
          </DCArtboard>
          <DCArtboard id="study" label="04 · Sesja powtórek (/sessions/review) ★ rozbudowana" width={1280} height={820}>
            <StudyV2 />
          </DCArtboard>
          <DCArtboard id="deepdive" label="05 · Deep Dive — picker (/sessions/deep-dive)" width={1024} height={900}>
            <DeepDiveScreen />
          </DCArtboard>
          <DCArtboard id="deepdive-active" label="06 · Deep Dive — aktywne pytanie ★" width={1024} height={720}>
            <DeepDiveActiveScreen />
          </DCArtboard>
          <DCArtboard id="audyty" label="07 · Audyty (/sessions/audit) ★" width={1024} height={900}>
            <AudytyScreen />
          </DCArtboard>
          <DCArtboard id="stats" label="08 · Statystyki (/stats) ★" width={1024} height={1100}>
            <StatystykiScreen />
          </DCArtboard>
          <DCArtboard id="ustawienia" label="09 · Ustawienia (/settings) ★" width={1024} height={1080}>
            <UstawieniaScreen />
          </DCArtboard>
          <DCArtboard id="koszty" label="10 · Koszty (/costs) ★" width={1024} height={1500}>
            <KosztyScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Motyw">
          <TweakRadio
            value={t.theme}
            options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
            onChange={(v) => setTweak('theme', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
